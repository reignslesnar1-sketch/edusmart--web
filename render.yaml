services:
  - type: web
    name: edusmart-school
    env: python
    pythonVersion: 3.11
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    port: 5000
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FLASK_ENV
        value: "production"
    routes:
      - path: /
        serviceId: edusmart-school
    autoDeploy: true
