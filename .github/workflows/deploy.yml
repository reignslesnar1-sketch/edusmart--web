name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Trigger Render Deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK secret not configured"
            echo "To enable auto-deployment to Render:"
            echo "1. Go to https://dashboard.render.com"
            echo "2. Navigate to your service"
            echo "3. Go to Settings → Deploy Hook"
            echo "4. Copy the URL"
            echo "5. In GitHub, go to Settings → Secrets → New repository secret"
            echo "6. Name it 'RENDER_DEPLOY_HOOK' and paste the URL"
            exit 0
          fi
          
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
          echo "✅ Deployment triggered on Render"
